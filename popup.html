<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <img src="icons/icon128.png" alt="Logo">
        <h1>CleanTube</h1>
      </div>
      <div class="status-dot"></div>
    </header>

    <div class="stats-banner">
      <div class="stat-group">
        <span class="stat-value" id="blockedCount">0</span>
        <span class="stat-label">Shorts Blocked</span>
      </div>
    </div>

    <div class="options-list">
      <div class="option-item">
        <div class="option-info">
          <span class="option-title">Hide Sidebar Button</span>
          <span class="option-desc">Remove Shorts from side menu</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="hideSidebar" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="option-item">
        <div class="option-info">
          <span class="option-title">Hide Home Shelves</span>
          <span class="option-desc">Clear shorts rows from feed</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="hideHome" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="option-item">
        <div class="option-info">
          <span class="option-title">Redirect Shorts URLs</span>
          <span class="option-desc">Auto-jump to home page</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="redirectAll" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <footer>
      <p class="footer-text">Clean and simple YouTube experience.</p>
      <span class="footer-tag">ELITE VERSION</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
